<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Imagem do Dia</title>
<meta http-equiv="refresh" content="1800">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
}

img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    animation: fadeInOut 10s infinite;
}

@keyframes fadeInOut {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>

<body>
<img src="imagem-do-dia.jpg" alt="Imagem do Dia">
</body>
</html>
